<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nexus Journal">
<meta name="theme-color" content="#0d1117">
<title>Nexus Trading Journal</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #111827;
    --bg3: #1a1f2e;
    --border: #1e2533;
    --green: #00e676;
    --red: #ff5252;
    --orange: #ff9800;
    --purple: #a78bfa;
    --text: #e0e6f0;
    --muted: #4a5568;
    --sub: #6b7280;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif; overscroll-behavior: none; }
  body { padding-top: var(--safe-top); padding-bottom: var(--safe-bot); }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
  #header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--bg); }
  .logo { font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--green); font-family: monospace; }
  .sublogo { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .header-pnl { font-size: 22px; font-weight: 800; font-family: monospace; text-align: right; }

  #nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 12px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; }
  .nav-btn.active { color: var(--green); border-bottom-color: var(--green); }

  #content { flex: 1; overflow-y: auto; padding: 12px; -webkit-overflow-scrolling: touch; }

  /* Cards */
  .card { background: var(--bg2); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .field input, .field select, .field textarea {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 16px; padding: 11px 12px; outline: none; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  .field textarea { resize: none; height: 64px; font-size: 14px; }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .mb10 { margin-bottom: 10px; }
  .mt16 { margin-top: 16px; }

  /* Toggles */
  .toggle { display: flex; gap: 6px; }
  .toggle-btn {
    flex: 1; padding: 10px 6px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; text-align: center;
  }
  .toggle-btn.long { background: #00e67618; border-color: var(--green); color: var(--green); }
  .toggle-btn.short { background: #ff525218; border-color: var(--red); color: var(--red); }
  .toggle-btn.instrument-active { background: #7c3aed22; border-color: var(--purple); color: var(--purple); }
  .toggle-btn .t-main { font-weight: 800; font-size: 14px; }
  .toggle-btn .t-sub { font-size: 10px; opacity: 0.7; margin-top: 2px; }
  .toggle-btn.yes { background: #00e67618; border-color: var(--green); color: var(--green); }
  .toggle-btn.no { background: #ff525218; border-color: var(--red); color: var(--red); }

  /* Chips */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 7px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .chip.active { background: #00e67618; border-color: var(--green); color: var(--green); }

  /* Preview */
  .preview-pnl { background: var(--bg3); border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 10px; color: var(--sub); }

  /* Save button */
  .save-btn { width: 100%; padding: 15px; background: var(--green); border: none; border-radius: 10px; color: #0d1117; font-size: 16px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; margin-top: 8px; transition: all 0.2s; }
  .save-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .save-btn.saved { background: #00c853; }

  /* Trade cards */
  .trade-card { background: var(--bg2); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); position: relative; }
  .trade-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .dir-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; margin-right: 6px; }
  .dir-long { background: #00e67618; color: var(--green); }
  .dir-short { background: #ff525218; color: var(--red); }
  .trade-strat { font-size: 12px; color: var(--muted); font-weight: 600; }
  .trade-meta { display: flex; gap: 10px; font-size: 11px; color: var(--muted); margin-bottom: 6px; flex-wrap: wrap; }
  .trade-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; border-radius: 4px; padding: 2px 6px; }
  .tag-green { background: #00e67612; color: var(--green); }
  .tag-red { background: #ff525212; color: var(--red); }
  .tag-neutral { background: var(--border); color: var(--muted); }
  .pnl-badge { font-size: 13px; font-weight: 800; font-family: monospace; padding: 3px 8px; border-radius: 5px; }
  .pnl-win { background: #00e67618; color: var(--green); }
  .pnl-loss { background: #ff525218; color: var(--red); }
  .pnl-neutral { color: var(--muted); }

  /* Delete */
  .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 15px; cursor: pointer; opacity: 0.35; padding: 4px; }
  .delete-confirm { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .delete-confirm span { color: var(--red); font-size: 12px; }
  .btn-delete-yes { background: var(--red); border: none; border-radius: 6px; color: #fff; font-size: 12px; padding: 6px 12px; cursor: pointer; }
  .btn-cancel { background: var(--border); border: none; border-radius: 6px; color: var(--sub); font-size: 12px; padding: 6px 12px; cursor: pointer; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--bg2); border-radius: 10px; padding: 14px 10px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-size: 20px; font-weight: 800; font-family: monospace; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }

  .bar-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .bar-label { width: 90px; color: var(--sub); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; background: var(--bg3); border-radius: 3px; height: 6px; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .bar-val { width: 65px; text-align: right; font-size: 12px; font-family: monospace; }
  .bar-pct { width: 32px; text-align: right; font-size: 11px; color: var(--muted); }

  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .total-label { font-size: 13px; color: var(--muted); }
  .total-val { font-size: 15px; font-weight: 700; font-family: monospace; }

  /* Week */
  .week-pnl { font-size: 32px; font-weight: 800; font-family: monospace; }
  .progress-track { background: var(--bg3); border-radius: 6px; height: 8px; margin: 12px 0 4px; }
  .progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }

  /* Empty */
  .empty { text-align: center; color: var(--muted); padding: 48px 24px; font-size: 14px; line-height: 1.7; }

  /* Toast */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #0d1117; padding: 10px 24px; border-radius: 20px; font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Install banner */
  #install-banner { background: #7c3aed22; border: 1px solid var(--purple); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  #install-banner p { font-size: 12px; color: var(--purple); line-height: 1.5; }
  #install-banner button { background: none; border: none; color: var(--purple); font-size: 18px; cursor: pointer; padding: 0 4px; }

  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  select { background-image: none; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div class="logo">NEXUS JOURNAL</div>
      <div class="sublogo" id="header-date">—</div>
    </div>
    <div>
      <div class="header-pnl" id="header-pnl">$0</div>
      <div class="sublogo" style="text-align:right">all-time P&L</div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn active" onclick="setView('log')">📋 Log</button>
    <button class="nav-btn" onclick="setView('add')">➕ Add</button>
    <button class="nav-btn" onclick="setView('stats')">📊 Stats</button>
    <button class="nav-btn" onclick="setView('week')">📅 Week</button>
  </div>

  <div id="content"></div>
</div>

<div id="toast">✅ Trade gespeichert!</div>

<script>
// ── STATE ──────────────────────────────────────────────
const STORAGE_KEY = 'nexus-journal-v2';
const INSTRUMENTS = {
  MES: { label: 'MES', pointValue: 5, desc: 'Micro S&P · $5/pt' },
  MNQ: { label: 'MNQ', pointValue: 2, desc: 'Micro Nasdaq · $2/pt' }
};
const STRATEGIES = ['ORB', 'Nexus Scalper', 'Manual'];
const EMOTIONS = ['calm', 'neutral', 'stressed', 'FOMO', 'angry'];

let trades = [];
let currentView = 'log';
let deleteConfirm = null;
let form = freshForm();
let installBannerDismissed = false;

function freshForm() {
  const now = new Date();
  return {
    date: now.toISOString().slice(0, 10),
    time: now.toTimeString().slice(0, 5),
    instrument: 'MES',
    strategy: 'ORB',
    direction: 'LONG',
    entry: '', stop: '', target: '', exit: '',
    contracts: '1',
    followedPlan: true,
    revengeT: false,
    emotion: 'neutral',
    note: ''
  };
}

// ── STORAGE ────────────────────────────────────────────
function loadTrades() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    trades = raw ? JSON.parse(raw) : [];
  } catch { trades = []; }
}
function saveTrades() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trades)); } catch {}
}

// ── CALC ───────────────────────────────────────────────
function calcPnL(trade) {
  const entry = parseFloat(trade.entry);
  const exit = parseFloat(trade.exit);
  const contracts = parseInt(trade.contracts) || 1;
  if (isNaN(entry) || isNaN(exit)) return null;
  const pts = trade.direction === 'LONG' ? exit - entry : entry - exit;
  const pv = INSTRUMENTS[trade.instrument]?.pointValue ?? 5;
  return parseFloat((pts * pv * contracts).toFixed(2));
}

function calcStats(tradeList) {
  const closed = tradeList.filter(t => t.pnl !== null && t.pnl !== undefined);
  if (!closed.length) return null;
  const wins = closed.filter(t => t.pnl > 0);
  const losses = closed.filter(t => t.pnl < 0);
  const totalPnl = closed.reduce((s, t) => s + t.pnl, 0);
  const grossWin = wins.reduce((s, t) => s + t.pnl, 0);
  const grossLoss = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
  const winRate = (wins.length / closed.length) * 100;
  const avgWin = wins.length ? grossWin / wins.length : 0;
  const avgLoss = losses.length ? grossLoss / losses.length : 0;
  const profitFactor = grossLoss > 0 ? grossWin / grossLoss : grossWin > 0 ? 999 : 0;
  const disciplined = closed.filter(t => t.followedPlan && !t.revengeT).length;
  const expectancy = (winRate / 100) * avgWin - ((100 - winRate) / 100) * avgLoss;
  const byStrategy = {};
  STRATEGIES.forEach(s => {
    const st = closed.filter(t => t.strategy === s);
    if (st.length) {
      const sw = st.filter(t => t.pnl > 0);
      byStrategy[s] = { count: st.length, pnl: st.reduce((a, t) => a + t.pnl, 0), winRate: (sw.length / st.length) * 100 };
    }
  });
  const byInstrument = {};
  Object.keys(INSTRUMENTS).forEach(inst => {
    const it = closed.filter(t => (t.instrument || 'MES') === inst);
    if (it.length) {
      const iw = it.filter(t => t.pnl > 0);
      byInstrument[inst] = { count: it.length, pnl: it.reduce((a, t) => a + t.pnl, 0), winRate: (iw.length / it.length) * 100 };
    }
  });
  const byDay = {};
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  closed.forEach(t => {
    const d = dayNames[new Date(t.date).getDay()];
    if (!byDay[d]) byDay[d] = { pnl: 0, count: 0 };
    byDay[d].pnl += t.pnl; byDay[d].count++;
  });
  return { total: closed.length, wins: wins.length, losses: losses.length, totalPnl, winRate, avgWin, avgLoss, profitFactor, expectancy, disciplinePct: (disciplined / closed.length) * 100, byStrategy, byInstrument, byDay };
}

// ── NAV ────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  deleteConfirm = null;
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['log','add','stats','week'][i] === v);
  });
  render();
}

// ── HELPERS ────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pnlBadge(val) {
  if (val === null || val === undefined) return '<span class="pnl-badge pnl-neutral">—</span>';
  const cls = val >= 0 ? 'pnl-win' : 'pnl-loss';
  return `<span class="pnl-badge ${cls}">${val >= 0 ? '+' : ''}$${val.toFixed(2)}</span>`;
}
function miniBar(val, max, color) {
  const pct = max > 0 ? Math.min((Math.abs(val) / max) * 100, 100) : 0;
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function isStandalone() {
  return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
}

// ── FORM EVENTS ────────────────────────────────────────
window.setField = function(k, v) { form[k] = v; renderContent(); }
window.setFieldVal = function(k, el) { form[k] = el.value; updatePreview(); }
window.setFieldCheck = function(k, v) { form[k] = v === 'true' || v === true; renderContent(); }
window.updatePreview = function() {
  const entry = parseFloat(document.getElementById('f-entry')?.value);
  const exit = parseFloat(document.getElementById('f-exit')?.value);
  const contracts = parseInt(document.getElementById('f-contracts')?.value) || 1;
  form.entry = isNaN(entry) ? '' : String(entry);
  form.exit = isNaN(exit) ? '' : String(exit);
  form.contracts = String(contracts);
  const preview = document.getElementById('preview-pnl');
  if (preview && form.entry && form.exit) {
    const pnl = calcPnL(form);
    const color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    preview.innerHTML = `${form.instrument} Preview: <strong style="color:${color}">${pnl >= 0 ? '+' : ''}$${pnl?.toFixed(2)}</strong> <span style="color:var(--muted);font-size:12px">(${INSTRUMENTS[form.instrument]?.desc})</span>`;
    preview.style.display = 'block';
  } else if (preview) {
    preview.style.display = 'none';
  }
}

window.submitTrade = function() {
  // Capture current input values
  const entryEl = document.getElementById('f-entry');
  const exitEl = document.getElementById('f-exit');
  const stopEl = document.getElementById('f-stop');
  const targetEl = document.getElementById('f-target');
  const contractsEl = document.getElementById('f-contracts');
  const noteEl = document.getElementById('f-note');
  if (entryEl) form.entry = entryEl.value;
  if (exitEl) form.exit = exitEl.value;
  if (stopEl) form.stop = stopEl.value;
  if (targetEl) form.target = targetEl.value;
  if (contractsEl) form.contracts = contractsEl.value;
  if (noteEl) form.note = noteEl.value;
  if (!form.entry || !form.exit) return;
  const pnl = calcPnL(form);
  trades.unshift({ ...form, id: Date.now(), pnl });
  saveTrades();
  form = freshForm();
  showToast();
  setTimeout(() => setView('log'), 600);
}

window.confirmDelete = function(id) {
  deleteConfirm = id;
  render();
}
window.cancelDelete = function() {
  deleteConfirm = null;
  render();
}
window.doDelete = function(id) {
  trades = trades.filter(t => t.id !== id);
  saveTrades();
  deleteConfirm = null;
  render();
}
window.dismissBanner = function() {
  installBannerDismissed = true;
  render();
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  // Header
  const totalPnl = trades.reduce((s, t) => s + (t.pnl || 0), 0);
  const pnlEl = document.getElementById('header-pnl');
  if (pnlEl) {
    pnlEl.textContent = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(0)}`;
    pnlEl.style.color = totalPnl >= 0 ? 'var(--green)' : 'var(--red)';
  }
  const dateEl = document.getElementById('header-date');
  if (dateEl) dateEl.textContent = new Date().toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  if (!el) return;
  if (currentView === 'add') el.innerHTML = renderAdd();
  else if (currentView === 'log') el.innerHTML = renderLog();
  else if (currentView === 'stats') el.innerHTML = renderStats();
  else if (currentView === 'week') el.innerHTML = renderWeek();
}

function renderAdd() {
  const pnl = calcPnL(form);
  const previewHtml = (form.entry && form.exit && pnl !== null)
    ? `<div class="preview-pnl" id="preview-pnl">${form.instrument} Preview: <strong style="color:${pnl >= 0 ? 'var(--green)' : 'var(--red)'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</strong> <span style="color:var(--muted);font-size:12px">(${INSTRUMENTS[form.instrument]?.desc})</span></div>`
    : `<div class="preview-pnl" id="preview-pnl" style="display:none"></div>`;

  const instBtns = Object.entries(INSTRUMENTS).map(([k, v]) =>
    `<button class="toggle-btn ${form.instrument === k ? 'instrument-active' : ''}" onclick="setField('instrument','${k}')">
      <div class="t-main">${v.label}</div><div class="t-sub">${v.desc}</div>
    </button>`).join('');

  const stratOptions = STRATEGIES.map(s => `<option value="${s}" ${form.strategy === s ? 'selected' : ''}>${s}</option>`).join('');
  const emotionChips = EMOTIONS.map(e => `<button class="chip ${form.emotion === e ? 'active' : ''}" onclick="setField('emotion','${e}')">${e}</button>`).join('');

  return `
    <div class="card">
      <div class="section-title">Neuer Trade</div>

      <div class="field mb10">
        <label>Instrument</label>
        <div class="toggle">${instBtns}</div>
      </div>

      <div class="row2">
        <div class="field"><label>Datum</label><input type="date" value="${form.date}" onchange="setField('date',this.value)"></div>
        <div class="field"><label>Zeit (MEZ)</label><input type="time" value="${form.time}" onchange="setField('time',this.value)"></div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Strategie</label>
          <select onchange="setField('strategy',this.value)">${stratOptions}</select>
        </div>
        <div class="field">
          <label>Richtung</label>
          <div class="toggle">
            <button class="toggle-btn ${form.direction === 'LONG' ? 'long' : ''}" onclick="setField('direction','LONG')">LONG</button>
            <button class="toggle-btn ${form.direction === 'SHORT' ? 'short' : ''}" onclick="setField('direction','SHORT')">SHORT</button>
          </div>
        </div>
      </div>

      <div class="row3">
        <div class="field"><label>Entry</label><input id="f-entry" type="number" placeholder="5300" value="${form.entry}" oninput="updatePreview()"></div>
        <div class="field"><label>Stop</label><input id="f-stop" type="number" placeholder="5295" value="${form.stop}" oninput="updatePreview()"></div>
        <div class="field"><label>Target</label><input id="f-target" type="number" placeholder="5310" value="${form.target}" oninput="updatePreview()"></div>
      </div>

      <div class="row2">
        <div class="field"><label>Exit Preis</label><input id="f-exit" type="number" placeholder="5308" value="${form.exit}" oninput="updatePreview()"></div>
        <div class="field"><label>Kontrakte</label><input id="f-contracts" type="number" min="1" value="${form.contracts}" oninput="updatePreview()"></div>
      </div>

      ${previewHtml}

      <div class="section-title mt16">Disziplin Check</div>

      <div class="row2">
        <div class="field">
          <label>Plan befolgt?</label>
          <div class="toggle">
            <button class="toggle-btn ${form.followedPlan ? 'yes' : ''}" onclick="setFieldCheck('followedPlan',true)">✅ Ja</button>
            <button class="toggle-btn ${!form.followedPlan ? 'no' : ''}" onclick="setFieldCheck('followedPlan',false)">❌ Nein</button>
          </div>
        </div>
        <div class="field">
          <label>Revenge Trade?</label>
          <div class="toggle">
            <button class="toggle-btn ${!form.revengeT ? 'yes' : ''}" onclick="setFieldCheck('revengeT',false)">✅ Nein</button>
            <button class="toggle-btn ${form.revengeT ? 'no' : ''}" onclick="setFieldCheck('revengeT',true)">⚠️ Ja</button>
          </div>
        </div>
      </div>

      <div class="field mb10">
        <label>Emotion</label>
        <div class="chips">${emotionChips}</div>
      </div>

      <div class="field mb10">
        <label>Notiz (optional)</label>
        <textarea id="f-note" placeholder="Was ist passiert? Was hast du gelernt?">${esc(form.note)}</textarea>
      </div>

      <button class="save-btn" onclick="submitTrade()" ${!form.entry || !form.exit ? 'disabled' : ''}>
        Trade speichern
      </button>
    </div>`;
}

function renderLog() {
  if (!trades.length) return '<div class="empty">Noch keine Trades.<br>Tippe auf ➕ Add um deinen ersten Trade einzutragen.</div>';
  const installBanner = (!isStandalone() && !installBannerDismissed)
    ? `<div id="install-banner"><p>📲 <strong>Als App speichern:</strong><br>Safari → Teilen → Zum Home-Bildschirm</p><button onclick="dismissBanner()">✕</button></div>`
    : '';
  return installBanner + trades.map(t => {
    const isConfirm = deleteConfirm === t.id;
    const dirClass = t.direction === 'LONG' ? 'dir-long' : 'dir-short';
    return `
    <div class="trade-card">
      <div class="trade-header">
        <div>
          <span class="dir-badge ${dirClass}">${t.direction}</span>
          <span class="trade-strat">${esc(t.strategy)} · ${esc(t.instrument || 'MES')}</span>
        </div>
        ${pnlBadge(t.pnl)}
      </div>
      <div class="trade-meta">
        <span>${t.date} ${t.time}</span>
        <span>${t.contracts}x ${t.instrument || 'MES'}</span>
        <span>${t.entry} → ${t.exit}</span>
      </div>
      <div class="trade-tags">
        ${t.followedPlan ? '<span class="tag tag-green">✅ Plan</span>' : '<span class="tag tag-red">❌ Kein Plan</span>'}
        ${t.revengeT ? '<span class="tag tag-red">⚠️ Revenge</span>' : ''}
        <span class="tag tag-neutral">${esc(t.emotion)}</span>
        ${t.note ? `<span class="tag tag-neutral" title="${esc(t.note)}">📝</span>` : ''}
      </div>
      ${isConfirm
        ? `<div class="delete-confirm"><span>Trade löschen?</span><button class="btn-delete-yes" onclick="doDelete(${t.id})">Ja, löschen</button><button class="btn-cancel" onclick="cancelDelete()">Abbrechen</button></div>`
        : `<button class="delete-btn" onclick="confirmDelete(${t.id})">🗑</button>`}
    </div>`;
  }).join('');
}

function renderStats() {
  const stats = calcStats(trades);
  if (!stats) return '<div class="empty">Mindestens einen Trade loggen um Stats zu sehen.</div>';

  const statCards = [
    ['Win Rate', `${stats.winRate.toFixed(1)}%`, stats.winRate >= 50 ? 'var(--green)' : 'var(--red)'],
    ['Profit Factor', stats.profitFactor >= 999 ? '∞' : stats.profitFactor.toFixed(2), stats.profitFactor >= 1.5 ? 'var(--green)' : 'var(--orange)'],
    ['Expectancy', `$${stats.expectancy.toFixed(0)}`, stats.expectancy >= 0 ? 'var(--green)' : 'var(--red)'],
    ['Disziplin', `${stats.disciplinePct.toFixed(0)}%`, stats.disciplinePct >= 80 ? 'var(--green)' : 'var(--orange)'],
    ['Ø Winner', `$${stats.avgWin.toFixed(0)}`, 'var(--green)'],
    ['Ø Loser', `-$${stats.avgLoss.toFixed(0)}`, 'var(--red)'],
  ].map(([l, v, c]) => `<div class="stat-card"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-label">${l}</div></div>`).join('');

  const stratRows = Object.entries(stats.byStrategy).map(([s, d]) => {
    const maxPnl = Math.max(...Object.values(stats.byStrategy).map(x => Math.abs(x.pnl)));
    const color = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="bar-row">
      <div class="bar-label">${s}</div>
      ${miniBar(d.pnl, maxPnl, color)}
      <div class="bar-val" style="color:${color}">${d.pnl >= 0 ? '+' : ''}$${d.pnl.toFixed(0)}</div>
      <div class="bar-pct">${d.winRate.toFixed(0)}%W</div>
    </div>`;
  }).join('');

  const instRows = Object.entries(stats.byInstrument).map(([inst, d]) => {
    const maxPnl = Math.max(...Object.values(stats.byInstrument).map(x => Math.abs(x.pnl)));
    const color = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="bar-row">
      <div class="bar-label">${inst}</div>
      ${miniBar(d.pnl, maxPnl, color)}
      <div class="bar-val" style="color:${color}">${d.pnl >= 0 ? '+' : ''}$${d.pnl.toFixed(0)}</div>
      <div class="bar-pct">${d.winRate.toFixed(0)}%W</div>
    </div>`;
  }).join('');

  const dayOrder = ['Mon','Tue','Wed','Thu','Fri'];
  const maxDay = Math.max(...Object.values(stats.byDay).map(x => Math.abs(x.pnl)), 1);
  const dayRows = dayOrder.filter(d => stats.byDay[d]).map(d => {
    const dd = stats.byDay[d];
    const color = dd.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="bar-row">
      <div class="bar-label">${d}</div>
      ${miniBar(dd.pnl, maxDay, color)}
      <div class="bar-val" style="color:${color}">${dd.pnl >= 0 ? '+' : ''}$${dd.pnl.toFixed(0)}</div>
      <div class="bar-pct">${dd.count}T</div>
    </div>`;
  }).join('');

  return `
    <div class="stats-grid">${statCards}</div>
    ${stratRows ? `<div class="card"><div class="section-title">Nach Strategie</div>${stratRows}</div>` : ''}
    ${instRows ? `<div class="card"><div class="section-title">MES vs MNQ</div>${instRows}</div>` : ''}
    ${dayRows ? `<div class="card"><div class="section-title">Nach Wochentag</div>${dayRows}</div>` : ''}
    <div class="card">
      <div class="section-title">Gesamt</div>
      <div class="total-row"><span class="total-label">Trades gesamt</span><span class="total-val">${stats.total}</span></div>
      <div class="total-row"><span class="total-label">Wins / Losses</span><span class="total-val"><span style="color:var(--green)">${stats.wins}W</span> / <span style="color:var(--red)">${stats.losses}L</span></span></div>
      <div class="total-row"><span class="total-label">Gesamt P&L</span><span class="total-val" style="color:${stats.totalPnl >= 0 ? 'var(--green)' : 'var(--red)'}">${stats.totalPnl >= 0 ? '+' : ''}$${stats.totalPnl.toFixed(2)}</span></div>
    </div>`;
}

function renderWeek() {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  weekStart.setHours(0, 0, 0, 0);
  const weekTrades = trades.filter(t => new Date(t.date) >= weekStart);
  const weekPnl = weekTrades.reduce((s, t) => s + (t.pnl || 0), 0);
  const goalPct = Math.min((weekPnl / 2500) * 100, 100);
  const pnlColor = weekPnl >= 0 ? 'var(--green)' : 'var(--red)';

  const weekCards = weekTrades.length ? weekTrades.map(t => {
    const dirClass = t.direction === 'LONG' ? 'dir-long' : 'dir-short';
    return `<div class="trade-card">
      <div class="trade-header">
        <div><span class="dir-badge ${dirClass}">${t.direction}</span><span class="trade-strat">${esc(t.strategy)} · ${esc(t.instrument || 'MES')}</span></div>
        ${pnlBadge(t.pnl)}
      </div>
      <div class="trade-meta"><span>${t.date} ${t.time}</span><span>${t.contracts}x ${t.instrument || 'MES'}</span></div>
      <div class="trade-tags">
        ${t.followedPlan ? '<span class="tag tag-green">✅ Plan</span>' : '<span class="tag tag-red">❌ Kein Plan</span>'}
        ${t.revengeT ? '<span class="tag tag-red">⚠️ Revenge</span>' : ''}
        <span class="tag tag-neutral">${esc(t.emotion)}</span>
      </div>
    </div>`;
  }).join('') : '<div class="empty">Noch keine Trades diese Woche.</div>';

  return `
    <div class="card">
      <div class="section-title">Diese Woche</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="week-pnl" style="color:${pnlColor}">${weekPnl >= 0 ? '+' : ''}$${weekPnl.toFixed(2)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">${weekTrades.length} Trades diese Woche</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:var(--sub)">Ziel: $2.500/Woche</div>
          <div style="font-size:11px;color:var(--muted)">→ 500$/Tag</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${Math.max(goalPct,0)}%;background:${pnlColor}"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:right">${goalPct.toFixed(0)}% des Wochenziels</div>
    </div>
    ${weekCards}`;
}

// ── INIT ───────────────────────────────────────────────
loadTrades();
render();
</script>
</body>
</html>
